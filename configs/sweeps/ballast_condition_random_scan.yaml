manifest_name: ballast_condition_random_scan
base_profile_dir: configs/standard
output_root: configs/trials/ballast_condition_random_scan
common:
  main_script: generate_main.py
  project_name: ballast_condition_random_scan
  vehicle_type: 楂橀€熷杞?
  irr_type: 闅忔満涓嶅钩椤?
  random_seed: 20260627
  defect_switch: 'off'
  tz: 5.0
  save_dof_mode: vehicle
  save_spy_level: core
  save_stride: 10
  plot_figs: 'Off'
  note_prefix: ballast_random
  description: Ballast hardening and loosening scan under the same fixed random irregularity realization.

cases:
