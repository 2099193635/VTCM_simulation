    note: Fixed-seed random irregularity, no ballast condition defect.
    updates: {}

  - case_id: case_01_harden_etaK2_etaC1_count5
    note: Hardened ballast, eta_k=2, eta_c=1, five consecutive sleepers.
    updates: {}
    structure_defects:
      - type: ballast_condition
        label: harden_etaK2_etaC1_count5
        start_m: 200.0
        count: 5
        side: both
        directions: vertical
        stiffness_factor_eta_k: 2.0
        damping_factor_eta_c: 1.0

