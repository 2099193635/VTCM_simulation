manifest_name: transition_settlement_random_scan
base_profile_dir: configs/standard
output_root: configs/trials/transition_settlement_random_scan
common:
  main_script: generate_main.py
  project_name: transition_settlement_random_scan
  irr_type: 闅忔満涓嶅钩椤?
  random_seed: 20260626
  defect_switch: 'off'
  tz: 5.0
  save_dof_mode: vehicle
  output_tier: normal
  plot_figs: 'Off'
  note_prefix: settlement_random
  description: Transition-zone settlement scan superimposed on the same random track irregularity realization.

cases:
  - case_id: case_00_random_baseline
    note: Random irregularity only, no settlement.
    updates: {}

  - case_id: case_01_random_cosine_05mm
    note: Random irregularity plus 20 m cosine settlement, 5 mm amplitude.
    updates: {}
    transition_settlements:
      - type: cosine
        label: random_cosine_20m_05mm
        start_m: 80.0
        length_m: 20.0
        amplitude_mm: 5.0

  - case_id: case_02_random_cosine_15mm
    note: Random irregularity plus 20 m cosine settlement, 15 mm amplitude.
    updates: {}
