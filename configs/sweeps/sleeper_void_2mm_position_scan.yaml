manifest_name: sleeper_void_2mm_position_scan
base_profile_dir: configs/standard
output_root: configs/trials/sleeper_void_2mm_position_scan
common:
  main_script: generate_main.py
  project_name: sleeper_void_2mm_position_scan
  vehicle_type: 楂橀€熷杞?
  save_dof_mode: vehicle
  save_spy_level: core
  save_stride: 10
  plot_figs: 'Off'
  note_prefix: void2mm
  description: Non-closing 2 mm sleeper void cases, with and without measured irregularity.

cases:
  - case_id: case_01_noirr_no_void
    note: No irregularity, no sleeper void.
    case_args:
      irr_type: 鏃犱笉骞抽『
    updates: {}

  - case_id: case_02_noirr_void_1_start_199p8m
    note: No irregularity, one 2 mm sleeper void at 199.8 m.
    case_args:
      irr_type: 鏃犱笉骞抽『
    updates: {}
    structure_defects:
      - type: sleeper_void
        label: noirr_void_1_199p8m
        start_m: 199.8
        count: 1
        side: both
        delta_gap_m: 0.002

  - case_id: case_03_noirr_void_2_start_199p8m
    note: No irregularity, two consecutive 2 mm sleeper voids from 199.8 m.
    case_args:
      irr_type: 鏃犱笉骞抽『
