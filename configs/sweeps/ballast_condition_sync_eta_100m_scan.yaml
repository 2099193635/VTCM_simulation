  irr_type: 闅忔満涓嶅钩椤?
  random_seed: 20260627
  vx_set: 215.0
  defect_switch: 'off'
  tz: 10.0
  save_dof_mode: vehicle
  save_spy_level: core
  save_stride: 10
  plot_figs: 'Off'
  note_prefix: ballast_sync100m
  description: 100 m ballast-condition scan with synchronized stiffness and damping multipliers under the same fixed random irregularity realization.

