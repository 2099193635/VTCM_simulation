manifest_name: transition_settlement_scan
base_profile_dir: configs/standard
output_root: configs/trials/transition_settlement_scan
common:
  main_script: generate_main.py
  project_name: transition_settlement_scan
  irr_type: 鏃犱笉骞抽『
  tz: 5.0
  save_dof_mode: vehicle
  output_tier: normal
  plot_figs: 'Off'
  note_prefix: settlement
  description: Transition-zone differential settlement scan with cosine and kink geometry profiles.

cases:
  - case_id: case_00_baseline
    note: No irregularity and no settlement.
    updates: {}

  - case_id: case_01_cosine_05mm
    note: 20 m cosine settlement, 5 mm amplitude.
    updates: {}
    transition_settlements:
      - type: cosine
        label: cosine_20m_05mm
        start_m: 80.0
        length_m: 20.0
        amplitude_mm: 5.0

  - case_id: case_02_cosine_15mm
    note: 20 m cosine settlement, 15 mm amplitude.
    updates: {}
    transition_settlements:
      - type: cosine
        label: cosine_20m_15mm
        start_m: 80.0
        length_m: 20.0
        amplitude_mm: 15.0

  - case_id: case_03_cosine_25mm
