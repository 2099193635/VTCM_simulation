      - type: cosine
        label: cosine_20m_25mm
        start_m: 80.0
        length_m: 20.0
        amplitude_mm: 25.0

  - case_id: case_04_cosine_35mm
    note: 20 m cosine settlement, 35 mm amplitude.
    updates: {}
    transition_settlements:
      - type: cosine
        label: cosine_20m_35mm
        start_m: 80.0
        length_m: 20.0
