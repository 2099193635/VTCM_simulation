  - case_id: case_05_kink_0p25permille
    note: 20 m kink settlement, 0.25 permille angle.
    updates: {}
    transition_settlements:
      - type: kink
        label: kink_20m_0p25permille
        start_m: 80.0
        length_m: 20.0
