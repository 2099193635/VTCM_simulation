manifest_name: high_speed_passenger_kpz_low_scan
base_profile_dir: configs/standard
output_root: configs/trials/high_speed_passenger_kpz_low_scan
common:
  project_name: 高速客车一系垂向扫描_降Kpz
  vehicle_type: 高速客车
  save_dof_mode: vehicle
  irr_type: 外部导入
  plot_figs: 'Off'
  note_prefix: kpz_low_scan
  description: >
    低一系垂向刚度扫描（接续上次结果，上次最优 Kpz=0.45e6+Cpz=6e3）。
